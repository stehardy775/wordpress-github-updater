# Optional configuration for wordpress-github-updater.
#
# This single file is read in two places:
#   - the local pre-commit hook -> copy destinations (UPDATER_DEST, RELEASE_DEST)
#   - the release.yml workflow   -> packaging options (everything below them)
# Each consumer ignores keys it does not recognise. Lines are shell
# assignments (KEY=value); quote any value that contains spaces.

# --- Local pre-commit hook: where the upstream files are copied to ---
# UPDATER_DEST=includes/GitHubUpdater.php
# RELEASE_DEST=.github/workflows/release.yml

# --- release.yml workflow: packaging options ---

# Force the file the version is read from, when auto-detection isn't suitable.
# SOURCE_FILE_OVERRIDE=my-plugin.php

# Override the zip's root folder name (defaults to the repository name).
# SLUG_OVERRIDE=my-plugin

# Extra paths/patterns to exclude from the release zip, in addition to the
# built-in defaults. Whitespace- or newline-separated rsync patterns.
# EXCLUDE_EXTRA="tests docs *.dist phpunit.xml.dist composer.json composer.lock"
