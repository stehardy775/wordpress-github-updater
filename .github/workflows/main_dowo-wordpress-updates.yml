# Generated by Azure Deployment Center, then adapted to deploy only the
# proxy/ subfolder (the repo root is the WordPress plugin, not the web app).
#
# Oryx installs proxy/requirements.txt on the platform during deployment
# (SCM_DO_BUILD_DURING_DEPLOYMENT=true, set automatically by Deployment Center),
# so no client-side build/venv step is needed.

name: Build and deploy Python app to Azure Web App - dowo-wordpress-updates

on:
  push:
    branches:
      - main
    paths:
      - 'proxy/**'
      - '.github/workflows/main_dowo-wordpress-updates.yml'
  workflow_dispatch:

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: deploy-proxy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Deploy proxy/ to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dowo-wordpress-updates'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9005333359714324A3C7E9979FDBF2B7 }}
          package: proxy   # deploy this folder only; Oryx builds requirements.txt
