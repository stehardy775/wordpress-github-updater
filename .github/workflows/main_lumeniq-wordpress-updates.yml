# Generated by Azure Deployment Center, then adapted to deploy only the
# proxy/ subfolder (the repo root is the WordPress plugin, not the web app).
#
# Oryx installs proxy/requirements.txt on the platform during deployment
# (SCM_DO_BUILD_DURING_DEPLOYMENT=true, set automatically by Deployment Center),
# so no client-side build/venv step is needed.

name: Build and deploy Python app to Azure Web App - lumeniq-wordpress-updates

on:
  push:
    branches:
      - main
    paths:
      - 'proxy/**'
      - '.github/workflows/main_lumeniq-wordpress-updates.yml'
  workflow_dispatch:

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: deploy-proxy-lumen
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'lumeniq-wordpress-updates'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_7AE7C08FDE904FE9B4C7E8503F3C1676 }}
          package: proxy   # deploy this folder only; Oryx builds requirements.txt